<!DOCTYPE html>
<html lang="id">

      <!-- Logo -->

        <div class="w-7 h-7 rounded-lg bg-[#3d8bfd] flex items-center justify-center text-xs font-black text-white select-none group-hover:bg-[#2d78ed] transition-colors">

  <main id="app" class="max-w-5xl mx-auto px-6 py-6"></main>

  <script src="/app.js" type="module"></script>

</html>
